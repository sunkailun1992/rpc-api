# rpc-api CI guards the executable part of the AI coding standard.
name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-test-security:
    name: Build, Test, and Security Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare scripts
        run: chmod +x gradlew scripts/check-secrets.sh

      - name: Compile
        run: ./gradlew -q compileJava

      - name: Test
        run: ./gradlew test

      - name: Publish to Maven Local
        run: ./gradlew -q publishToMavenLocal

      - name: Secret warning scan
        run: bash scripts/check-secrets.sh
